    <p>Rock Paper Scissors</p>

    <!--Javascript is strategic and methodical and logical in the way we approach a task. We develop a clean strategy and put it into steps in order of the operation we need. 
    
    For this Rock Paper Scissors game we develop the following strategy:
    
    Define and generate the computers random move for the button we click (rock, paper or scissors)
    
    We then need to compare the results 
    
    Then we display the results in an alert.-->


<!--Rock Button-->

    <button onclick="
    const randomNumber = Math.random();

    let computerMove = '';

    if (randomNumber >= 0 && randomNumber < 1 / 3) {
         computerMove = 'rock';
    } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
         computerMove = 'paper';
    } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
         computerMove = 'scissors';
    }

    
    let result = '';

    if (computerMove === 'rock') {
       result = 'Tie.';
    } else if (computerMove === 'paper') {
        result = 'You lose.';
    } else if (computerMove === 'scissors') {
        result = 'You win!';
    }

    alert(`You picked rock. Computer picked ${computerMove}. ${result}`);
    ">Rock</button>

        computerMove = 'rock';
    } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {

        result = 'You Win!';
