<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin-flip Game</title>
</head>
<body>
    

    <script>

        const randomNumber = Math.random();
        let result;

        if (randomNumber <= 0.5) {
            result = 'Heads';
        } else {
            result = 'Tails';
        }

        console.log(result);

        const guess = 'Tails';

        /* if Statement*/
        /*
        if (guess === result) {
            console.log('You win!')
        } else {
            console.log('You lose!');
        }
            */
        /*Ternary operator - This acts as a shortcut*/
        console.log(guess === result ? 'You win!' : 'You lose!');

        
    </script>
</body>
</html>
