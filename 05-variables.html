<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script>

        // Variables are used to store data that can be used and manipulated throughout a program.

        // In JavaScript, you can declare a variable using the `let` keyword, followed by the variable name and an optional initial value.

        // ; The semicolon tells the javascript that the statement is complete. 

        // Here are some examples of variable declarations and usage:

        let variable1 = 3;
        console.log(variable1); // Output: 3

        let calculation = 2 + 2;
        console.log(calculation); // Output: 4
        console.log(calculation + 2); // Output: 6

        let result = calculation + 2;
        console.log(result); // Output: 6

        let message = "hello";
        console.log(message); console.log(';');// Output: "hello"

        variable1 = 5; // You can reassign a new value to the variable
        console.log(variable1); // Output: 5


        variable1 = variable1 + 1;
        console.log(variable1); // Output: 6

    </script>
</body>
</html>
