<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <!--To turn on/off auto completions (cursor tab cmd + shift + p)
    
    To turn on/off auto completions (github Co-Pilot) bottom right toggle of editor-->

    <p>Rock Paper Scissors</p>

    <!--Javascript is strategic and methodical and logical in the way we approach a task. We develop a clean strategy and put it into steps in order of the operation we need. 
    
    For this Rock Paper Scissors game we develop the following strategy:
    
    Define and generate the computers random move for the button we click (rock, paper or scissors)
    
    We then need to compare the results 
    
    Then we display the results in an alert.-->

    <!--Rock Button-->

    <button onclick="playGame('rock')">Rock</button>

    <!--Paper Button-->

    <button onclick="playGame('paper')">Paper</button>

    <!--Scissors Button-->

    <button onclick="playGame('scissors')">Scissors</button>

    <script>
      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = "";

        if (playerMove === "scissors") {
          if (computerMove === "rock") {
            result = "You Lose.";
          } else if (computerMove === "paper") {
            result = "You Win!";
          } else if (computerMove === "scissors") {
            result = "Tie.";
          }

        } else if (playerMove === "paper") {
          if (computerMove === "rock") {
            result = "You Win!";
          } else if (computerMove === "paper") {
            result = "Tie.";
          } else if (computerMove === "scissors") {
            result = "You lose.";
          }
          
        } else if (playerMove === "rock") {
          if (computerMove === "rock") {
            result = "Tie.";
          } else if (computerMove === "paper") {
            result = "You lose.";
          } else if (computerMove === "scissors") {
            result = "You win!";
          }
        }

        alert(
          `You picked ${playerMove}. Computer picked ${computerMove}. ${result}`,
        );
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = "";

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "paper";
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = "scissors";
        }

        return computerMove; //Return statements = gets a value out of a function.
      }
    </script>
  </body>
</html>
